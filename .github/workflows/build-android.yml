name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --output ./build/thaiid.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/thaiid.apk
          name: Thai ID ${{ github.ref_name }}
          body: |
            Thai National ID Card viewer — ${{ github.ref_name }}
