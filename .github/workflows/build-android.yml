name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS cloud
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json 2>/dev/null > build-result.json
          cat build-result.json
          ARTIFACT_URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl' build-result.json)
          echo "Downloading APK from: $ARTIFACT_URL"
          curl -L "$ARTIFACT_URL" -o thaiid.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: thaiid.apk
          name: Thai ID ${{ github.ref_name }}
          body: Thai National ID Card viewer — ${{ github.ref_name }}
